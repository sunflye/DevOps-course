replicaCount: 5

image:
  repository: sunflye/devops-info-service
  tag: "latest"
  pullPolicy: IfNotPresent

service:
  type: NodePort
  port: 80
  targetPort: 5000
  nodePort: 30080

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "200m"
    memory: "256Mi"

livenessProbe:
  enabled: true
  path: /health
  initialDelaySeconds: 10
  periodSeconds: 5

readinessProbe:
  enabled: true
  path: /health
  initialDelaySeconds: 5
  periodSeconds: 3

env:
  port: "5000"

httpRoute:
  enabled: false

ingress:
  enabled: false

secret:
  username: "placeholder-user"
  password: "placeholder-pass"

vault:
  enabled: false
  role: "app-python"
  secretPath: "secret/data/app-python/config"

configmap:
  environment: "production"
  logLevel: "INFO"
  cacheTTL: "3600"

persistence:
  enabled: true
  size: 100Mi
  storageClass: ""
