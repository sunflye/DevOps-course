version: '3.8'

services:
  app-python:
    build:
      context: ./app_python
      dockerfile: Dockerfile
    container_name: app-python
    ports:
      - "5000:5000"
    environment:
      HOST: "0.0.0.0"
      PORT: "5000"
      DATA_DIR: "/data"
      DEBUG: "False"
    volumes:
      - ./data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

volumes:
  data:
