---
- name: Docker installation and setup
  block:
    - name: Install Docker prerequisites
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
        state: present

    - name: Add Docker GPG key
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: Add Docker repository
      apt_repository:
        repo: "deb https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        state: present

    - name: Install Docker packages
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
        state: present

  rescue:
    - name: Wait before retrying
      pause:
        seconds: 10

    - name: Retry apt update
      apt:
        update_cache: yes
        cache_valid_time: 3600
      register: apt_retry

    - name: Retry Docker installation
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
        state: present
      when: apt_retry is succeeded

  always:
    - name: Ensure Docker service is started and enabled
      service:
        name: docker
        state: started
        enabled: yes

    - name: Log Docker installation completion
      copy:
        content: "Docker installation completed at {{ ansible_date_time.iso8601 }}\n"
        dest: "/tmp/docker_install_completion.log"
        force: no

  tags:
    - docker
    - docker_install

- name: Docker user configuration
  block:
    - name: Add ubuntu user to docker group
      user:
        name: ubuntu
        groups: docker
        append: yes

    - name: Install python3-docker via apt
      apt:
        name: python3-docker
        state: present

  always:
    - name: Log Docker user configuration completion
      copy:
        content: "Docker user configuration completed at {{ ansible_date_time.iso8601 }}\n"
        dest: "/tmp/docker_config_completion.log"
        force: no

  tags:
    - docker
    - docker_config