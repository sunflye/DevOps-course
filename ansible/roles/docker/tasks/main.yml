- name: Install Docker prerequisites
  apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
    state: present
  tags:
    - docker_install

- name: Add Docker GPG key
  apt_key:
    url: https://download.docker.com/linux/ubuntu/gpg
    state: present
  tags:
    - docker_install

- name: Add Docker repository
  apt_repository:
    repo: "deb https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
    state: present
  tags:
    - docker_install

- name: Install Docker packages
  apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
    state: present
  notify: restart docker
  tags:
    - docker_install

- name: Enable Docker service
  service:
    name: docker
    state: started
    enabled: yes
  tags:
    - docker_install

- name: Add ubuntu user to docker group
  user:
    name: ubuntu
    groups: docker
    append: yes
  tags:
    - docker_users

- name: Install python3-docker via apt (Ubuntu 24.04 fix)
  apt:
    name: python3-docker
    state: present
  tags:
    - docker_python