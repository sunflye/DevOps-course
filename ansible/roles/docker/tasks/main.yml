---
- name: Docker installation and setup
  block:
    - name: Install Docker prerequisites
      ansible.builtin.apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
        state: present

    - name: Add Docker GPG key
      ansible.builtin.apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: Add Docker repository
      ansible.builtin.apt_repository:
        repo: "deb https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        state: present

    - name: Install Docker packages
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
        state: present

  rescue:
    - name: Wait before retrying
      ansible.builtin.pause:
        seconds: 10

    - name: Retry apt update
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600
      register: docker_apt_retry

    - name: Retry Docker installation
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
        state: present

  always:
    - name: Ensure Docker service is started and enabled
      ansible.builtin.service:
        name: docker
        state: started
        enabled: true

    - name: Log Docker installation completion
      ansible.builtin.copy:
        content: "Docker installation completed at {{ ansible_date_time.iso8601 }}\n"
        dest: "/tmp/docker_install_completion.log"
        mode: '0644'

  tags:
    - docker
    - docker_install

- name: Docker user configuration
  block:
    - name: Add ubuntu user to docker group
      ansible.builtin.user:
        name: ubuntu
        groups: docker
        append: true

    - name: Install python3-docker via apt
      ansible.builtin.apt:
        name: python3-docker
        state: present

  always:
    - name: Log Docker user configuration completion
      ansible.builtin.copy:
        content: "Docker user configuration completed at {{ ansible_date_time.iso8601 }}\n"
        dest: "/tmp/docker_config_completion.log"
        mode: '0644'

  tags:
    - docker
    - docker_install