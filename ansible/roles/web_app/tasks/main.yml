---
# Wipe logic runs first (when explicitly requested)
- name: Include wipe tasks
  include_tasks: wipe.yml
  tags:
    - web_app_wipe

# Now deploy with Docker Compose (existing tasks follow below)
- name: Deploy application with Docker Compose
  block:
    - name: Remove old container (idempotent)
      community.docker.docker_container:
        name: "{{ app_name }}"
        state: absent
      ignore_errors: yes
      tags:
        - app_deploy
        - compose

    - name: Create application directory
      file:
        path: "{{ compose_project_dir }}"
        state: directory
        mode: '0755'

    - name: Template docker-compose.yml
      template:
        src: docker-compose.yml.j2
        dest: "{{ compose_project_dir }}/docker-compose.yml"
        mode: '0644'
      register: compose_template

    - name: Deploy with Docker Compose
      community.docker.docker_compose_v2:
        project_src: "{{ compose_project_dir }}"
        state: present
        pull: missing
        recreate: auto
      register: compose_result

    - name: Wait for application to be ready
      wait_for:
        port: "{{ app_port }}"
        delay: 2
        timeout: 30

    - name: Verify health endpoint
      uri:
        url: "http://localhost:{{ app_port }}/health"
        status_code: 200
      register: health_check
      retries: 5
      delay: 5

    - name: Display health check result
      debug:
        msg: "✅ Application is healthy: {{ health_check.json.status | default('ok') }}"

  rescue:
    - name: Log deployment failure
      debug:
        msg: "Deployment failed, attempting rollback"

    - name: Rollback deployment
      community.docker.docker_compose_v2:
        project_src: "{{ compose_project_dir }}"
        state: absent
      ignore_errors: yes

  always:
    - name: Log deployment completion
      copy:
        content: "Deployment completed at {{ ansible_date_time.iso8601 }}\n"
        dest: "/tmp/web_app_deployment.log"
        force: no

  tags:
    - app_deploy
    - compose
    - web_app